<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Ostiarius mark">
  <!-- a key: the doorkeeper's tool -->
  <g stroke="currentColor" stroke-linecap="round" fill="none" stroke-width="5">
    <!-- ring -->
    <circle cx="20" cy="40" r="12"/>
    <!-- shaft -->
    <line x1="32" y1="40" x2="70" y2="40"/>
    <!-- teeth -->
    <line x1="58" y1="40" x2="58" y2="52"/>
    <line x1="66" y1="40" x2="66" y2="48"/>
  </g>
</svg>
