<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Limen — the threshold of your self-hosted infrastructure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- doorway mark, large, centered-left -->
  <g stroke="#f8fafc" stroke-linecap="square" fill="none" transform="translate(100, 70)">
    <line x1="30" y1="20" x2="30" y2="140" stroke-width="8"/>
    <line x1="130" y1="20" x2="130" y2="140" stroke-width="8"/>
    <line x1="18" y1="20" x2="142" y2="20" stroke-width="8"/>
    <line x1="10" y1="140" x2="150" y2="140" stroke-width="14"/>
  </g>

  <!-- wordmark -->
  <text x="340" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="400" letter-spacing="6" fill="#f8fafc">LIMEN</text>

  <!-- tagline -->
  <text x="340" y="195" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="300" letter-spacing="1" fill="#94a3b8">
    the threshold of your self-hosted infrastructure
  </text>

  <!-- etymology -->
  <text x="340" y="240" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#64748b">
    Latin: threshold — the stone at the bottom of a Roman doorway
  </text>
</svg>
